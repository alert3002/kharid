# Kharid.tj — iOS build & TestFlight via Codemagic
# Docs: https://docs.codemagic.io/yaml-quick-start/building-a-flutter-app/
#
# Setup in Codemagic UI (one time):
# 1. Team settings → Integrations → App Store Connect → add API key (.p8)
# 2. Applications → this repo → Environment variables (if not using integration):
#    - APP_STORE_CONNECT_ISSUER_ID
#    - APP_STORE_CONNECT_KEY_IDENTIFIER
#    - APP_STORE_CONNECT_PRIVATE_KEY (contents of AuthKey_XXX.p8)
# 3. Code signing → iOS → bundle tj.kharid.app (or let yaml auto-sign)

workflows:
  kharid-ios-release:
    name: Kharid.tj iOS Release
    max_build_duration: 90
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: codemagic

    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: tj.kharid.app

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
        - pattern: release/*
          include: true

    scripts:
      - name: Flutter packages
        script: flutter pub get

      - name: Build IPA
        script: flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - App Store Connect Users

  kharid-android-release:
    name: Kharid.tj Android Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      android_signing:
        - kharid_android_keystore

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Flutter packages
        script: flutter pub get

      - name: Build AAB
        script: flutter build appbundle --release

    artifacts:
      - build/app/outputs/bundle/release/*.aab
